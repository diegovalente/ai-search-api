services:
  - type: web
    name: ai-search-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false  # You'll set this in the Render dashboard
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: LLM_TIMEOUT_MS
        value: 30000
      - key: LOG_LEVEL
        value: info

